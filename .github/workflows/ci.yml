name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  control-plane:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kaaval
          POSTGRES_PASSWORD: password
          POSTGRES_DB: kaaval_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kaaval -d kaaval_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: postgresql://kaaval:password@localhost:5432/kaaval_db
          KAAVAL_ADMIN_PASSWORD: test-admin-password
          KAAVAL_SECRET_KEY: ci_secret_key
          KAAVAL_REFRESH_SECRET_KEY: ci_refresh_secret_key
        run: pytest tests/ --cov=app --cov-fail-under=60

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "26"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # Report-only: Invigil grades the repo's doctrine (see README badge); the
  # scorecard lands as a PR comment and in the job summary. Never blocks CI.
  invigil:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Invigil scorecard (report-only)
        id: invigil
        uses: invigil/invigil@31a39b1acc83d8a1c9c9530179acf772a6ce9438 # v1.5.1
        with:
          enforce: "false"
          # Fork PRs have a read-only token — skip the comment there.
          comment: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}

      # The action leaves the CLI installed; the composite action doesn't
      # declare an `outputs:` block yet (invigil/invigil issue filed), so
      # regenerate the markdown report for the job summary directly.
      - name: Publish report to job summary
        run: invigil score . --format markdown >> "$GITHUB_STEP_SUMMARY"
