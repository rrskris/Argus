version: "3.9"

# ── Kaaval — self-hosted deployment ─────────────────────────────────────────────
# Usage:
#   cp .env.example .env          # fill in your secrets
#   docker compose up -d
#
# Optional services (ClickHouse, OTel Collector) are disabled by default.
# Enable them by running: docker compose --profile observability up -d

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kaaval
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: kaaval_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaaval -d kaaval_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Control Plane (FastAPI) ───────────────────────────────────────────────────
  control-plane:
    build:
      context: ../control-plane
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kaaval:${POSTGRES_PASSWORD:-password}@postgres:5432/kaaval_db
      KAAVAL_SECRET_KEY: ${KAAVAL_SECRET_KEY:-change_me_in_prod}
      KAAVAL_REFRESH_SECRET_KEY: ${KAAVAL_REFRESH_SECRET_KEY:-change_me_refresh_in_prod}
      KAAVAL_ADMIN_PASSWORD: ${KAAVAL_ADMIN_PASSWORD:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-mock}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-mock}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      EXTENSIONS_DIR: /app/extensions/integrations
    volumes:
      - ../extensions:/app/extensions:ro
      - ../plugins:/app/plugins:ro
      - audit_logs:/var/log/kaaval
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Dashboard (Next.js) ───────────────────────────────────────────────────────
  dashboard:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - control-plane
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"

  # ── Cloud Scanner (Go, run-to-completion job) ─────────────────────────────────
  # Not a long-running service — triggered by control-plane via KAAVAL_SCANNER_BIN.
  # This profile lets you run a one-off scan manually:
  #   docker compose run --rm cloud-scanner --role-arn arn:aws:iam::...
  cloud-scanner:
    build:
      context: ../cloud-scanner
      dockerfile: Dockerfile
    profiles: ["scanner"]
    environment:
      DATABASE_URL: postgresql://kaaval:${POSTGRES_PASSWORD:-password}@postgres:5432/kaaval_db
      EXTENSIONS_DIR: /app/extensions/integrations
    volumes:
      - ../extensions:/app/extensions:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── ClickHouse (optional — for eBPF + syslog time-series) ────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: kaaval
      CLICKHOUSE_USER: kaaval
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-password}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP

  # ── OpenTelemetry Collector (optional — for eBPF agent mode) ─────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.105.0
    profiles: ["observability"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - clickhouse

volumes:
  postgres_data:
  clickhouse_data:
  audit_logs:
