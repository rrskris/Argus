apiVersion: v1
kind: Service
metadata:
  name: {{ include "kaaval.controlPlane.fullname" . }}
  labels:
{{ include "kaaval.controlPlane.labels" . | indent 4 }}
spec:
  type: {{ .Values.controlPlane.service.type }}
  ports:
    - port: {{ .Values.controlPlane.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
{{ include "kaaval.controlPlane.selectorLabels" . | indent 4 }}
